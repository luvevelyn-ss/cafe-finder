<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5EFE6;
  --espresso: #2C1A0E;
  --mocha: #6B3F2A;
  --latte: #C4956A;
  --latte-light: #d4a57a;
  --foam: #EDE0CE;
  --foam2: #F9F4EE;
  --shadow: rgba(44,26,14,0.12);
  --green: #2e7d32;
  --green-bg: #e8f5e9;
  --red: #c62828;
  --red-bg: #fce4ec;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--espresso); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* HEADER */
header { background:var(--espresso); padding:12px 20px; display:flex; align-items:center; gap:14px; flex-shrink:0; z-index:10; box-shadow:0 2px 12px rgba(0,0,0,0.3); }
.logo { font-family:'Playfair Display',serif; color:var(--latte); font-size:1.4rem; white-space:nowrap; }
.logo span { color:var(--foam); }
.location-status { flex:1; display:flex; align-items:center; gap:8px; }
.location-dot { width:8px; height:8px; border-radius:50%; background:#4ade80; flex-shrink:0; animation:pulse 2s infinite; }
.location-dot.searching { background:var(--latte); }
.location-dot.error { background:#f87171; animation:none; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
.location-text { font-size:0.82rem; color:rgba(237,224,206,0.7); }
.btn-recenter { background:rgba(255,255,255,0.08); border:1px solid rgba(196,149,106,0.3); color:var(--latte); padding:8px 14px; border-radius:8px; cursor:pointer; font-size:0.82rem; font-family:'DM Sans',sans-serif; font-weight:500; transition:background 0.2s; white-space:nowrap; }
.btn-recenter:hover { background:rgba(196,149,106,0.15); }

/* LAYOUT */
.main { display:flex; flex:1; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:340px; flex-shrink:0; background:var(--foam); overflow-y:auto; border-right:1px solid rgba(44,26,14,0.1); display:flex; flex-direction:column; }
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:rgba(107,63,42,0.2); border-radius:4px; }

/* FILTERS */
.filters { padding:10px 14px; border-bottom:1px solid rgba(44,26,14,0.08); flex-direction:column; gap:8px; background:var(--foam2); display:flex; }
.filter-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.filter-label { font-size:0.72rem; font-weight:600; color:var(--mocha); text-transform:uppercase; letter-spacing:0.07em; min-width:42px; }
.filter-btn { background:white; border:1px solid rgba(107,63,42,0.2); color:var(--mocha); padding:5px 11px; border-radius:20px; font-size:0.76rem; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.15s; }
.filter-btn:hover { border-color:var(--latte); color:var(--latte); }
.filter-btn.active { background:var(--espresso); border-color:var(--espresso); color:var(--foam); }

/* RESULTS HEADER */
.sidebar-header { padding:10px 14px 8px; border-bottom:1px solid rgba(44,26,14,0.08); position:sticky; top:0; background:var(--foam); z-index:2; }
.results-count { font-size:0.75rem; color:var(--mocha); font-weight:600; text-transform:uppercase; letter-spacing:0.07em; }

/* CARDS */
.cafe-list { padding:10px; display:flex; flex-direction:column; gap:8px; }
.cafe-card { background:white; border-radius:12px; overflow:hidden; cursor:pointer; transition:box-shadow 0.2s,transform 0.15s; border:2px solid transparent; box-shadow:0 1px 4px var(--shadow); }
.cafe-card:hover { box-shadow:0 4px 14px var(--shadow); transform:translateY(-1px); }
.cafe-card.active { border-color:var(--latte); }
.card-photo { width:100%; height:110px; object-fit:cover; display:block; background:#e8ddd0; image-rendering:auto; -webkit-backface-visibility:hidden; }
.card-photo-placeholder { width:100%; height:110px; background:linear-gradient(135deg,#e8ddd0,#d4c4b0); display:flex; align-items:center; justify-content:center; font-size:2rem; color:rgba(107,63,42,0.3); }
.card-body { padding:10px 12px 11px; }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; margin-bottom:3px; }
.cafe-name { font-family:'Playfair Display',serif; font-size:0.92rem; font-weight:700; color:var(--espresso); line-height:1.3; }
.open-badge { font-size:0.68rem; font-weight:600; padding:2px 7px; border-radius:20px; white-space:nowrap; flex-shrink:0; margin-top:2px; }
.open-badge.open { background:var(--green-bg); color:var(--green); }
.open-badge.closed { background:var(--red-bg); color:var(--red); }
.cafe-address { font-size:0.74rem; color:var(--mocha); margin-bottom:6px; opacity:0.75; line-height:1.3; }
.card-bottom { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.stars { display:flex; gap:1px; }
.star { font-size:0.8rem; }
.star.filled { color:#f59e0b; }
.star.empty { color:#d1c4b0; }
.rating-text { font-size:0.8rem; font-weight:600; color:var(--espresso); }
.review-count { font-size:0.72rem; color:var(--mocha); opacity:0.65; }
.distance-badge { margin-left:auto; background:var(--foam); border-radius:20px; padding:3px 9px; font-size:0.72rem; font-weight:600; color:var(--mocha); white-space:nowrap; }

/* EMPTY / LOADING */
.empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center; gap:8px; min-height:200px; }
.empty-icon { font-size:2.2rem; }
.empty-title { font-family:'Playfair Display',serif; font-size:1rem; color:var(--mocha); }
.empty-sub { font-size:0.79rem; color:var(--mocha); opacity:0.6; line-height:1.5; }
.spinner { width:28px; height:28px; border:3px solid var(--foam); border-top-color:var(--latte); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 10px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* MAP */
#map { flex:1; }

/* DETAIL PANEL */
.detail-panel { position:fixed; top:0; right:0; width:380px; height:100vh; background:white; z-index:100; box-shadow:-4px 0 30px rgba(44,26,14,0.15); transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; overflow:hidden; }
.detail-panel.open { transform:translateX(0); }
.detail-photos { position:relative; height:200px; background:#e8ddd0; flex-shrink:0; overflow:hidden; }
.detail-photos img { width:100%; height:100%; object-fit:cover; }
.detail-photos-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:3rem; color:rgba(107,63,42,0.25); background:linear-gradient(135deg,#e8ddd0,#d4c4b0); }
.photo-nav { position:absolute; bottom:10px; right:10px; display:flex; gap:5px; }
.photo-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.5); cursor:pointer; transition:background 0.2s; }
.photo-dot.active { background:white; }
.photo-prev, .photo-next { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.35); color:white; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
.photo-prev { left:10px; } .photo-next { right:10px; }
.photo-prev:hover, .photo-next:hover { background:rgba(0,0,0,0.6); }
.btn-close { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.4); border:none; color:white; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; z-index:5; transition:background 0.2s; }
.btn-close:hover { background:rgba(0,0,0,0.65); }
.detail-body { flex:1; overflow-y:auto; padding:18px 20px; }
.detail-body::-webkit-scrollbar { width:3px; }
.detail-name { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--espresso); line-height:1.2; margin-bottom:6px; }
.detail-meta { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.detail-rating { display:flex; align-items:center; gap:5px; }
.detail-rating .stars .star { font-size:0.9rem; }
.detail-rating-num { font-size:0.9rem; font-weight:700; color:var(--espresso); }
.detail-reviews-count { font-size:0.8rem; color:var(--mocha); opacity:0.7; }
.detail-info { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; padding:12px; background:var(--foam2); border-radius:10px; }
.info-row { display:flex; gap:10px; align-items:flex-start; font-size:0.82rem; }
.info-icon { font-size:0.95rem; flex-shrink:0; margin-top:1px; }
.info-text { color:var(--espresso); line-height:1.4; }
.info-text a { color:var(--mocha); text-decoration:none; border-bottom:1px solid rgba(107,63,42,0.3); }
.info-text a:hover { color:var(--latte); }
.section-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:var(--espresso); margin-bottom:10px; }
.reviews-list { display:flex; flex-direction:column; gap:12px; }
.review-card { padding:12px; background:var(--foam2); border-radius:10px; border-left:3px solid var(--latte); }
.review-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.reviewer-name { font-weight:600; font-size:0.82rem; color:var(--espresso); }
.review-time { font-size:0.72rem; color:var(--mocha); opacity:0.6; }
.review-stars { display:flex; gap:1px; margin-bottom:5px; }
.review-stars .star { font-size:0.78rem; }
.review-text { font-size:0.8rem; color:var(--mocha); line-height:1.5; }
.detail-actions { display:flex; gap:8px; padding:14px 20px; border-top:1px solid rgba(44,26,14,0.08); flex-shrink:0; }
.btn-action { flex:1; padding:10px; border-radius:9px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.82rem; cursor:pointer; transition:all 0.2s; text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:5px; }
.btn-directions { background:var(--espresso); color:var(--foam); border:none; }
.btn-directions:hover { background:var(--mocha); }
.btn-website { background:white; color:var(--espresso); border:2px solid rgba(44,26,14,0.15); }
.btn-website:hover { border-color:var(--latte); }

/* OVERLAY */
.overlay { position:fixed; inset:0; background:rgba(44,26,14,0.3); z-index:99; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.overlay.show { opacity:1; pointer-events:all; }

/* PERMISSION SCREEN */
.permission-screen { position:fixed; inset:0; background:var(--cream); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:40px; text-align:center; }
.big-icon { font-size:4rem; }
.permission-screen h2 { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--espresso); }
.permission-screen p { font-size:0.9rem; color:var(--mocha); line-height:1.6; max-width:320px; opacity:0.8; }
.btn-allow { background:var(--espresso); color:var(--foam); border:none; padding:14px 32px; border-radius:12px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:1rem; cursor:pointer; transition:background 0.2s; }
.btn-allow:hover { background:var(--mocha); }
</style>
</head>
<body>

<div class="permission-screen" id="permissionScreen">
  <div class="big-icon">📍</div>
  <h2>Find Cafés Near You</h2>
  <p>Allow location access to discover cafés around you, see how far they are, and get live updates as you move.</p>
  <button class="btn-allow" onclick="startTracking()">Allow Location & Start</button>
</div>

<header>
  <div class="logo">☕ <span>Café</span>Finder</div>
  <div class="location-status">
    <div class="location-dot searching" id="locationDot"></div>
    <span class="location-text" id="locationText">Getting your location…</span>
  </div>
  <button class="btn-recenter" onclick="recenter()">📍 Recenter</button>
</header>

<div class="main">
  <div class="sidebar">
    <div class="filters">
      <div class="filter-row">
        <span class="filter-label">Sort</span>
        <button class="filter-btn active" onclick="setSort('distance',this)">Nearest</button>
        <button class="filter-btn" onclick="setSort('rating',this)">Top Rated</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">Show</span>
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('open',this)">Open Now</button>
        <button class="filter-btn" onclick="setFilter('rated',this)">4★ & above</button>
      </div>
    </div>
    <div class="sidebar-header">
      <div class="results-count" id="resultsCount">Waiting for location…</div>
    </div>
    <div class="cafe-list" id="cafeList">
      <div class="empty-state">
        <div class="empty-icon">☕</div>
        <div class="empty-title">Ready to explore</div>
        <div class="empty-sub">Allow location access to find cafés near you.</div>
      </div>
    </div>
  </div>
  <div id="map"></div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-photos" id="detailPhotos">
    <button class="btn-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div class="detail-actions" id="detailActions"></div>
</div>

<script>
// ── API KEY ──
const API_KEY = 'AIzaSyC21VAjnpDZIVbxo1NenZnD7b1PJ_fwy84';

let map, placesService, userMarker, accuracyCircle;
let markers = [], allPlaces = [], filteredPlaces = [];
let activeCard = null;
let currentSort = 'distance', currentFilter = 'all';
let currentPhotos = [], currentPhotoIndex = 0;
let currentLocation = null;
let lastSearchLocation = null;
const SEARCH_RADIUS = 5000;   // 5km radius
const REFRESH_DISTANCE = 300; // refresh if moved 300m

function startTracking() {
  document.getElementById('permissionScreen').style.display = 'none';
  loadGoogleMaps();
  beginWatchingLocation();
}

function loadGoogleMaps() {
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=places&callback=initMap`;
  s.async = true;
  s.onerror = () => alert('Failed to load Google Maps. Check your API key.');
  document.head.appendChild(s);
}

window.initMap = function() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 51.509865, lng: -0.118092 },
    zoom: 15,
    styles: mapStyle(),
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
  });
  placesService = new google.maps.places.PlacesService(map);
};

// ── LIVE LOCATION ──
function beginWatchingLocation() {
  if (!navigator.geolocation) { setLocationError('Geolocation not supported.'); return; }
  navigator.geolocation.watchPosition(onLocationUpdate, onLocationError, {
    enableHighAccuracy: true, maximumAge: 10000, timeout: 15000
  });
}

function onLocationUpdate(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const accuracy = pos.coords.accuracy;
  currentLocation = { lat, lng };

  document.getElementById('locationDot').className = 'location-dot';
  document.getElementById('locationText').textContent = 'Live location active';

  if (!map) { setTimeout(() => onLocationUpdate(pos), 500); return; }

  if (!userMarker) {
    // First time — create blue dot and accuracy circle
    userMarker = new google.maps.Marker({
      map, position: currentLocation, title: 'You are here',
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10, fillColor: '#4285F4', fillOpacity: 1,
        strokeColor: 'white', strokeWeight: 3,
      },
      zIndex: 999,
    });
    accuracyCircle = new google.maps.Circle({
      map, center: currentLocation, radius: accuracy,
      fillColor: '#4285F4', fillOpacity: 0.08,
      strokeColor: '#4285F4', strokeOpacity: 0.3, strokeWeight: 1,
    });
    map.setCenter(currentLocation);
    map.setZoom(15);
    findCafes();
  } else {
    // Update position
    userMarker.setPosition(currentLocation);
    accuracyCircle.setCenter(currentLocation);
    accuracyCircle.setRadius(accuracy);
    // Refresh cafés if moved enough
    if (lastSearchLocation && haversineDistance(lastSearchLocation, currentLocation) > REFRESH_DISTANCE) {
      findCafes();
    }
  }
}

function onLocationError() {
  setLocationError('Location denied. Enable location in browser settings.');
}

function setLocationError(msg) {
  document.getElementById('locationDot').className = 'location-dot error';
  document.getElementById('locationText').textContent = msg;
}

function recenter() {
  if (map && currentLocation) { map.panTo(currentLocation); map.setZoom(15); }
}

// ── FIND CAFÉS ──
function findCafes() {
  if (!map || !placesService || !currentLocation) return;
  lastSearchLocation = { ...currentLocation };
  setLoading();
  placesService.nearbySearch({
    location: currentLocation,
    radius: SEARCH_RADIUS,
    keyword: 'cafe coffee shop espresso bar',
    type: 'cafe'
  }, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK && results.length) {
      allPlaces = results.filter(p =>
        p.types.includes('cafe') || p.types.includes('bakery') ||
        p.name.toLowerCase().includes('coffee') ||
        p.name.toLowerCase().includes('cafe') ||
        p.name.toLowerCase().includes('café')
      );
      applyFiltersAndSort();
    } else {
      showError('No cafés found nearby. Try moving to a busier area.');
    }
  });
}

// ── FILTERS & SORT ──
function setSort(val, el) {
  currentSort = val;
  document.querySelectorAll('.filter-row:first-child .filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (allPlaces.length) applyFiltersAndSort();
}

function setFilter(val, el) {
  currentFilter = val;
  document.querySelectorAll('.filter-row:last-child .filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (allPlaces.length) applyFiltersAndSort();
}

function applyFiltersAndSort() {
  let places = [...allPlaces];
  if (currentFilter === 'open') places = places.filter(p => p.opening_hours?.isOpen?.() === true);
  if (currentFilter === 'rated') places = places.filter(p => p.rating >= 4);
  if (currentSort === 'rating') places.sort((a, b) => (b.rating||0) - (a.rating||0));
  if (currentSort === 'distance') {
    places.sort((a, b) => getPlaceDistance(a) - getPlaceDistance(b));
  }
  filteredPlaces = places;
  clearMarkers();
  renderCards(filteredPlaces);
  filteredPlaces.forEach((p, i) => addMarker(p, i));
  document.getElementById('resultsCount').textContent = `${filteredPlaces.length} café${filteredPlaces.length !== 1 ? 's' : ''} nearby`;
}

// ── DISTANCE ──
function haversineDistance(a, b) {
  const R = 6371000, toRad = x => x * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function getPlaceDistance(place) {
  if (!currentLocation) return 0;
  const loc = place.geometry.location;
  const lat = typeof loc.lat === 'function' ? loc.lat() : loc.lat;
  const lng = typeof loc.lng === 'function' ? loc.lng() : loc.lng;
  return haversineDistance(currentLocation, { lat, lng });
}

function formatDistance(m) {
  return m < 1000 ? `${Math.round(m)}m` : `${(m/1000).toFixed(1)}km`;
}

// ── RENDER CARDS ──
function renderCards(places) {
  const list = document.getElementById('cafeList');
  list.innerHTML = '';
  if (!places.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div><div class="empty-sub">Try adjusting filters.</div></div>`;
    return;
  }
  places.forEach((place, i) => {
    const card = document.createElement('div');
    card.className = 'cafe-card';
    card.id = `card-${i}`;
    const isOpen = place.opening_hours?.isOpen?.();
    const openHTML = isOpen === true ? '<span class="open-badge open">Open</span>' : isOpen === false ? '<span class="open-badge closed">Closed</span>' : '';
    const dist = getPlaceDistance(place);
    const photoHTML = place.photos?.length
      ? `<img class="card-photo" src="${place.photos[0].getUrl({maxWidth:800,maxHeight:400})}" alt="${place.name}" loading="lazy">`
      : `<div class="card-photo-placeholder">☕</div>`;
    card.innerHTML = `
      ${photoHTML}
      <div class="card-body">
        <div class="card-top"><div class="cafe-name">${place.name}</div>${openHTML}</div>
        <div class="cafe-address">${place.vicinity || ''}</div>
        <div class="card-bottom">
          <div class="stars">${renderStars(place.rating)}</div>
          <span class="rating-text">${place.rating ? place.rating.toFixed(1) : '–'}</span>
          <span class="review-count">${place.user_ratings_total ? `(${place.user_ratings_total.toLocaleString()})` : ''}</span>
          <span class="distance-badge">📍 ${formatDistance(dist)}</span>
        </div>
      </div>`;
    card.addEventListener('click', () => openDetail(place, i));
    list.appendChild(card);
  });
}

// ── DETAIL PANEL ──
function openDetail(place, index) {
  if (activeCard !== null) document.getElementById(`card-${activeCard}`)?.classList.remove('active');
  activeCard = index;
  document.getElementById(`card-${index}`)?.classList.add('active');
  if (place.geometry?.location) { map.panTo(place.geometry.location); map.setZoom(17); }
  if (markers[index]) google.maps.event.trigger(markers[index], 'click');

  placesService.getDetails({
    placeId: place.place_id,
    fields: ['name','rating','user_ratings_total','formatted_address','formatted_phone_number','website','opening_hours','photos','reviews','url']
  }, (details, status) => {
    renderDetailPanel(status === google.maps.places.PlacesServiceStatus.OK ? details : place, place);
  });

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function renderDetailPanel(p, originalPlace) {
  const photosEl = document.getElementById('detailPhotos');
  currentPhotos = p.photos || [];
  currentPhotoIndex = 0;
  photosEl.innerHTML = '<button class="btn-close" onclick="closeDetail()">✕</button>';

  if (currentPhotos.length) {
    const img = document.createElement('img');
    img.src = currentPhotos[0].getUrl({ maxWidth:760, maxHeight:400 });
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    photosEl.appendChild(img);
    if (currentPhotos.length > 1) {
      photosEl.innerHTML += `<button class="photo-prev" onclick="changePhoto(-1)">‹</button><button class="photo-next" onclick="changePhoto(1)">›</button>`;
      const nav = document.createElement('div');
      nav.className = 'photo-nav'; nav.id = 'photoNav';
      currentPhotos.slice(0,5).forEach((_,i) => {
        const dot = document.createElement('div');
        dot.className = 'photo-dot'+(i===0?' active':'');
        dot.onclick = () => goToPhoto(i);
        nav.appendChild(dot);
      });
      photosEl.appendChild(nav);
    }
  } else {
    photosEl.innerHTML += '<div class="detail-photos-placeholder">☕</div>';
  }

  const isOpen = p.opening_hours?.isOpen?.();
  const openBadge = isOpen === true ? '<span class="open-badge open" style="font-size:0.75rem;padding:3px 9px">Open Now</span>'
    : isOpen === false ? '<span class="open-badge closed" style="font-size:0.75rem;padding:3px 9px">Closed</span>' : '';
  const dist = getPlaceDistance(originalPlace || p);
  const distBadge = `<span style="background:var(--foam);border-radius:20px;padding:3px 10px;font-size:0.75rem;font-weight:600;color:var(--mocha)">📍 ${formatDistance(dist)} away</span>`;

  let hoursHTML = '';
  if (p.opening_hours?.weekday_text) {
    hoursHTML = `<div class="info-row"><span class="info-icon">🕐</span><div class="info-text" style="font-size:0.78rem">${p.opening_hours.weekday_text.join('<br>')}</div></div>`;
  }

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-name">${p.name}</div>
    <div class="detail-meta">
      <div class="detail-rating"><div class="stars">${renderStars(p.rating)}</div><span class="detail-rating-num">${p.rating ? p.rating.toFixed(1) : '–'}</span></div>
      <span class="detail-reviews-count">${p.user_ratings_total ? `${p.user_ratings_total.toLocaleString()} reviews` : 'No reviews'}</span>
      ${openBadge} ${distBadge}
    </div>
    <div class="detail-info">
      ${p.formatted_address ? `<div class="info-row"><span class="info-icon">📍</span><div class="info-text">${p.formatted_address}</div></div>` : ''}
      ${p.formatted_phone_number ? `<div class="info-row"><span class="info-icon">📞</span><div class="info-text"><a href="tel:${p.formatted_phone_number}">${p.formatted_phone_number}</a></div></div>` : ''}
      ${p.website ? `<div class="info-row"><span class="info-icon">🌐</span><div class="info-text"><a href="${p.website}" target="_blank" rel="noopener">${new URL(p.website).hostname}</a></div></div>` : ''}
      ${hoursHTML}
    </div>
    ${p.reviews?.length ? `
      <div class="section-title">Recent Reviews</div>
      <div class="reviews-list">
        ${p.reviews.slice(0,5).map(r => `
          <div class="review-card">
            <div class="review-top"><span class="reviewer-name">${r.author_name}</span><span class="review-time">${r.relative_time_description}</span></div>
            <div class="review-stars">${renderStars(r.rating)}</div>
            <div class="review-text">${r.text || '<em>No written review.</em>'}</div>
          </div>`).join('')}
      </div>` : ''}
  `;

  const mapsUrl = p.url || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name)}`;
  document.getElementById('detailActions').innerHTML = `
    <a class="btn-action btn-directions" href="${mapsUrl}" target="_blank" rel="noopener">🗺️ Directions</a>
    ${p.website ? `<a class="btn-action btn-website" href="${p.website}" target="_blank" rel="noopener">🌐 Website</a>` : ''}
    ${p.formatted_phone_number ? `<a class="btn-action btn-website" href="tel:${p.formatted_phone_number}">📞 Call</a>` : ''}
  `;
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  if (activeCard !== null) document.getElementById(`card-${activeCard}`)?.classList.remove('active');
  activeCard = null;
}

function changePhoto(dir) {
  const max = Math.min(currentPhotos.length, 5);
  currentPhotoIndex = (currentPhotoIndex + dir + max) % max;
  goToPhoto(currentPhotoIndex);
}

function goToPhoto(i) {
  currentPhotoIndex = i;
  const img = document.getElementById('detailPhotos').querySelector('img');
  if (img) img.src = currentPhotos[i].getUrl({ maxWidth:760, maxHeight:400 });
  document.querySelectorAll('.photo-dot').forEach((d,idx) => d.classList.toggle('active', idx===i));
}

// ── MARKERS ──
function addMarker(place, index) {
  const marker = new google.maps.Marker({
    map, position: place.geometry.location, title: place.name,
    icon: {
      path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
      fillColor:'#6B3F2A', fillOpacity:1, strokeColor:'#F5EFE6', strokeWeight:1.5,
      scale:1.5, anchor: new google.maps.Point(12,22),
    }
  });

  const dist = getPlaceDistance(place);
  const iw = new google.maps.InfoWindow({
    content: `<div style="font-family:'DM Sans',sans-serif;padding:4px 6px;min-width:160px">
      <div style="font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:#2C1A0E;margin-bottom:3px">${place.name}</div>
      <div style="font-size:0.75rem;color:#6B3F2A;margin-bottom:4px">${place.vicinity||''}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="color:#f59e0b;font-size:0.8rem">★ <strong style="color:#2C1A0E">${place.rating ? place.rating.toFixed(1) : '–'}</strong></span>
        <span style="font-size:0.75rem;color:#6B3F2A;font-weight:600">📍 ${formatDistance(dist)}</span>
      </div>
    </div>`
  });

  marker.addListener('click', () => {
    markers.forEach(m => m._iw?.close());
    iw.open(map, marker);
    marker._iw = iw;
    if (activeCard !== null) document.getElementById(`card-${activeCard}`)?.classList.remove('active');
    activeCard = index;
    document.getElementById(`card-${index}`)?.classList.add('active');
    document.getElementById(`card-${index}`)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
  });
  marker._iw = null;
  markers[index] = marker;
}

function clearMarkers() {
  markers.forEach(m => { m._iw?.close(); m.setMap(null); });
  markers = []; activeCard = null;
}

// ── HELPERS ──
function renderStars(rating) {
  if (!rating) return '<span style="font-size:0.72rem;color:#aaa">No rating</span>';
  return Array.from({length:5},(_,i) => `<span class="star ${i<Math.round(rating)?'filled':'empty'}">★</span>`).join('');
}

function setLoading() {
  document.getElementById('cafeList').innerHTML = `<div class="empty-state"><div class="spinner"></div><div class="empty-title">Finding cafés…</div></div>`;
  document.getElementById('resultsCount').textContent = 'Searching nearby…';
}

function showError(msg) {
  document.getElementById('cafeList').innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-title">Nothing found</div><div class="empty-sub">${msg}</div></div>`;
  document.getElementById('resultsCount').textContent = '0 results';
}

function mapStyle() {
  return [
    {featureType:'all',elementType:'geometry.fill',stylers:[{saturation:-20},{lightness:5}]},
    {featureType:'water',elementType:'geometry',stylers:[{color:'#c8d8e8'}]},
    {featureType:'road',elementType:'geometry',stylers:[{color:'#f0e8df'}]},
    {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#e0d0c0'}]},
    {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#d8e8c8'}]},
    {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
    {featureType:'administrative',elementType:'labels.text.fill',stylers:[{color:'#6B3F2A'}]},
  ];
}
</script>

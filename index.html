<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5EFE6;
    --espresso: #2C1A0E;
    --mocha: #6B3F2A;
    --latte: #C4956A;
    --foam: #EDE0CE;
    --shadow: rgba(44,26,14,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--espresso);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--espresso);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    color: var(--latte);
    font-size: 1.5rem;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .logo span { color: var(--foam); }

  .search-bar {
    flex: 1;
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(196,149,106,0.3);
    border-radius: 10px;
    padding: 0 16px;
    gap: 10px;
    max-width: 500px;
    transition: border-color 0.2s;
  }

  .search-bar:focus-within { border-color: var(--latte); }

  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--foam);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    width: 100%;
    padding: 10px 0;
  }

  .search-bar input::placeholder { color: rgba(237,224,206,0.45); }

  .search-icon { color: var(--latte); font-size: 1rem; flex-shrink: 0; }

  .btn-search {
    background: var(--latte);
    color: var(--espresso);
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-search:hover { background: #d4a57a; }
  .btn-search:active { transform: scale(0.97); }

  .btn-locate {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(196,149,106,0.3);
    color: var(--latte);
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-locate:hover { background: rgba(196,149,106,0.15); }

  /* ── Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 360px;
    flex-shrink: 0;
    background: var(--foam);
    overflow-y: auto;
    border-right: 1px solid rgba(44,26,14,0.1);
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(44,26,14,0.08);
    position: sticky;
    top: 0;
    background: var(--foam);
    z-index: 2;
  }

  .results-count {
    font-size: 0.78rem;
    color: var(--mocha);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── API Key Banner ── */
  .api-banner {
    margin: 16px;
    background: linear-gradient(135deg, var(--espresso), var(--mocha));
    border-radius: 12px;
    padding: 18px;
    color: var(--foam);
  }

  .api-banner h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    margin-bottom: 8px;
    color: var(--latte);
  }

  .api-banner p { font-size: 0.8rem; line-height: 1.5; opacity: 0.85; margin-bottom: 12px; }

  .api-input-row { display: flex; gap: 8px; }

  .api-input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(196,149,106,0.4);
    border-radius: 7px;
    padding: 8px 12px;
    color: var(--foam);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    outline: none;
  }

  .api-input::placeholder { color: rgba(237,224,206,0.4); }
  .api-input:focus { border-color: var(--latte); }

  .btn-apply {
    background: var(--latte);
    color: var(--espresso);
    border: none;
    padding: 8px 14px;
    border-radius: 7px;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-apply:hover { background: #d4a57a; }

  /* ── Cafe Cards ── */
  .cafe-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  .cafe-card {
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s;
    border: 2px solid transparent;
    box-shadow: 0 1px 4px var(--shadow);
  }

  .cafe-card:hover {
    box-shadow: 0 4px 16px var(--shadow);
    transform: translateY(-1px);
  }

  .cafe-card.active {
    border-color: var(--latte);
    box-shadow: 0 4px 16px rgba(196,149,106,0.25);
  }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }

  .cafe-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.98rem;
    font-weight: 700;
    color: var(--espresso);
    line-height: 1.3;
  }

  .open-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .open-badge.open { background: #e8f5e9; color: #2e7d32; }
  .open-badge.closed { background: #fce4ec; color: #c62828; }

  .cafe-address {
    font-size: 0.78rem;
    color: var(--mocha);
    margin: 5px 0 8px;
    line-height: 1.4;
    opacity: 0.8;
  }

  .card-bottom { display: flex; align-items: center; gap: 12px; }

  .stars { display: flex; gap: 2px; }

  .star { font-size: 0.85rem; }
  .star.filled { color: #f59e0b; }
  .star.empty { color: #d1c4b0; }

  .rating-text { font-size: 0.82rem; font-weight: 600; color: var(--espresso); }
  .review-count { font-size: 0.75rem; color: var(--mocha); opacity: 0.7; }

  /* ── Empty / Loading States ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    gap: 10px;
  }

  .empty-icon { font-size: 2.5rem; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--mocha); }
  .empty-sub { font-size: 0.82rem; color: var(--mocha); opacity: 0.65; line-height: 1.5; }

  .spinner {
    width: 30px; height: 30px;
    border: 3px solid var(--foam);
    border-top-color: var(--latte);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Map ── */
  #map { flex: 1; }

  /* ── Info Window custom ── */
  .gm-style .info-box {
    font-family: 'DM Sans', sans-serif;
    padding: 4px;
    min-width: 200px;
  }

  /* ── Scrollbar ── */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(107,63,42,0.2); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">☕ <span>Café</span>Finder</div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search location (e.g. Shoreditch, London)" />
  </div>
  <button class="btn-search" onclick="searchCafes()">Find Cafés</button>
  <button class="btn-locate" onclick="useMyLocation()" title="Use my location">📍 Near Me</button>
</header>

<div class="main">
  <div class="sidebar" id="sidebar">
    <!-- API Key Banner -->
    <div class="api-banner" id="apiBanner">
      <h3>🔑 Enter your API Key</h3>
      <p>Paste your Google Maps API key below to load the map and start finding cafés near you.</p>
      <div class="api-input-row">
        <input class="api-input" type="password" id="apiKeyInput" placeholder="AIza..." />
        <button class="btn-apply" onclick="applyApiKey()">Apply</button>
      </div>
    </div>

    <div class="sidebar-header" id="sidebarHeader" style="display:none">
      <div class="results-count" id="resultsCount">Enter a location to search</div>
    </div>

    <div class="cafe-list" id="cafeList">
      <div class="empty-state">
        <div class="empty-icon">🗺️</div>
        <div class="empty-title">No results yet</div>
        <div class="empty-sub">Add your API key above, then search a location or use "Near Me" to discover cafés.</div>
      </div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script>
  let map, placesService, geocoder, markers = [], activeCard = null, apiKey = '';

  function applyApiKey() {
    apiKey = document.getElementById('apiKeyInput').value.trim();
    if (!apiKey) { alert('Please enter a valid API key.'); return; }
    loadGoogleMaps();
  }

  function loadGoogleMaps() {
    if (document.getElementById('gmapsScript')) return;
    const script = document.createElement('script');
    script.id = 'gmapsScript';
    script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places&callback=initMap`;
    script.async = true;
    script.onerror = () => alert('Failed to load Google Maps. Check your API key and make sure Maps JavaScript API & Places API are enabled.');
    document.head.appendChild(script);
  }

  window.initMap = function () {
    document.getElementById('apiBanner').style.display = 'none';
    document.getElementById('sidebarHeader').style.display = 'block';

    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 51.509865, lng: -0.118092 },
      zoom: 13,
      styles: mapStyle(),
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: false,
    });

    placesService = new google.maps.places.PlacesService(map);
    geocoder = new google.maps.Geocoder();
  };

  function searchCafes() {
    const query = document.getElementById('searchInput').value.trim();
    if (!map) { alert('Please apply your API key first.'); return; }
    if (!query) { alert('Enter a location to search.'); return; }

    setLoading();
    geocoder.geocode({ address: query }, (results, status) => {
      if (status === 'OK') {
        const loc = results[0].geometry.location;
        map.setCenter(loc);
        map.setZoom(14);
        findCafes(loc);
      } else {
        showError('Location not found. Try a different search.');
      }
    });
  }

  function useMyLocation() {
    if (!map) { alert('Please apply your API key first.'); return; }
    if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
    setLoading();
    navigator.geolocation.getCurrentPosition(
      pos => {
        const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setCenter(loc);
        map.setZoom(14);
        findCafes(loc);
      },
      () => showError('Could not get your location. Check browser permissions.')
    );
  }

  function findCafes(location) {
    clearMarkers();
    placesService.nearbySearch({
      location,
      radius: 1000,
      type: 'cafe',
      keyword: 'cafe coffee'
    }, (results, status) => {
      if (status === google.maps.places.PlacesServiceStatus.OK && results.length) {
        renderCards(results);
        results.forEach((place, i) => addMarker(place, i));
        document.getElementById('resultsCount').textContent = `${results.length} cafés found`;
      } else {
        showError('No cafés found in this area. Try zooming out or a different location.');
      }
    });
  }

  function renderCards(places) {
    const list = document.getElementById('cafeList');
    list.innerHTML = '';
    places.forEach((place, i) => {
      const card = document.createElement('div');
      card.className = 'cafe-card';
      card.id = `card-${i}`;

      const isOpen = place.opening_hours?.isOpen?.();
      const openHTML = isOpen === true
        ? '<span class="open-badge open">Open</span>'
        : isOpen === false
        ? '<span class="open-badge closed">Closed</span>'
        : '';

      card.innerHTML = `
        <div class="card-top">
          <div class="cafe-name">${place.name}</div>
          ${openHTML}
        </div>
        <div class="cafe-address">${place.vicinity || 'Address not available'}</div>
        <div class="card-bottom">
          <div class="stars">${renderStars(place.rating)}</div>
          <span class="rating-text">${place.rating ? place.rating.toFixed(1) : '–'}</span>
          <span class="review-count">${place.user_ratings_total ? `(${place.user_ratings_total.toLocaleString()} reviews)` : 'No reviews'}</span>
        </div>
      `;

      card.addEventListener('click', () => selectPlace(place, i));
      list.appendChild(card);
    });
  }

  function renderStars(rating) {
    if (!rating) return '<span style="font-size:0.75rem;color:#aaa">No rating</span>';
    let html = '';
    for (let i = 1; i <= 5; i++) {
      html += `<span class="star ${i <= Math.round(rating) ? 'filled' : 'empty'}">★</span>`;
    }
    return html;
  }

  function selectPlace(place, index) {
    // Highlight card
    if (activeCard) document.getElementById(`card-${activeCard}`)?.classList.remove('active');
    activeCard = index;
    document.getElementById(`card-${index}`)?.classList.add('active');
    document.getElementById(`card-${index}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Pan map
    if (place.geometry?.location) {
      map.panTo(place.geometry.location);
      map.setZoom(16);
    }

    // Trigger marker click
    if (markers[index]) google.maps.event.trigger(markers[index], 'click');
  }

  function addMarker(place, index) {
    const marker = new google.maps.Marker({
      map,
      position: place.geometry.location,
      title: place.name,
      icon: {
        path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
        fillColor: '#6B3F2A',
        fillOpacity: 1,
        strokeColor: '#F5EFE6',
        strokeWeight: 1.5,
        scale: 1.6,
        anchor: new google.maps.Point(12, 22),
      }
    });

    const infoWindow = new google.maps.InfoWindow({
      content: `
        <div style="font-family:'DM Sans',sans-serif;padding:6px 8px;min-width:180px;max-width:240px">
          <div style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#2C1A0E;margin-bottom:4px">${place.name}</div>
          <div style="font-size:0.78rem;color:#6B3F2A;margin-bottom:6px">${place.vicinity || ''}</div>
          <div style="display:flex;align-items:center;gap:6px;font-size:0.82rem">
            <span style="color:#f59e0b">★</span>
            <strong>${place.rating ? place.rating.toFixed(1) : '–'}</strong>
            <span style="color:#999">${place.user_ratings_total ? `· ${place.user_ratings_total.toLocaleString()} reviews` : ''}</span>
          </div>
        </div>
      `
    });

    marker.addListener('click', () => {
      markers.forEach(m => m._iw?.close());
      infoWindow.open(map, marker);
      marker._iw = infoWindow;
      // Highlight card
      if (activeCard !== null) document.getElementById(`card-${activeCard}`)?.classList.remove('active');
      activeCard = index;
      document.getElementById(`card-${index}`)?.classList.add('active');
      document.getElementById(`card-${index}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    markers[index] = marker;
    marker._iw = null;
  }

  function clearMarkers() {
    markers.forEach(m => { m._iw?.close(); m.setMap(null); });
    markers = [];
    activeCard = null;
  }

  function setLoading() {
    document.getElementById('cafeList').innerHTML = `
      <div class="empty-state">
        <div class="spinner"></div>
        <div class="empty-title">Finding cafés…</div>
      </div>`;
    document.getElementById('resultsCount').textContent = 'Searching…';
  }

  function showError(msg) {
    document.getElementById('cafeList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">😕</div>
        <div class="empty-title">Nothing found</div>
        <div class="empty-sub">${msg}</div>
      </div>`;
    document.getElementById('resultsCount').textContent = '0 results';
  }

  // Press Enter to search
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchCafes();
  });

  function mapStyle() {
    return [
      { featureType: 'all', elementType: 'geometry.fill', stylers: [{ saturation: -20 }, { lightness: 5 }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#c8d8e8' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#f0e8df' }] },
      { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#e0d0c0' }] },
      { featureType: 'poi.park', elementType: 'geometry', stylers: [{ color: '#d8e8c8' }] },
      { featureType: 'transit', elementType: 'geometry', stylers: [{ visibility: 'simplified' }] },
      { featureType: 'administrative', elementType: 'labels.text.fill', stylers: [{ color: '#6B3F2A' }] },
      { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
    ];
  }
</script>
</body>
</html>
